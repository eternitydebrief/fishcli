# Build-speed knobs.
#
# To turn on the mold linker (saves ~5x on the link step), `nix develop`
# the dev shell so `mold` and `clang` end up on PATH, then uncomment the
# linker block below. sccache (the rustc wrapper) is set up automatically
# by the flake's shellHook — no config needed here.

# [target.x86_64-unknown-linux-gnu]
# linker = "clang"
# rustflags = [
#   "-C", "link-arg=-fuse-ld=mold",
#   "-C", "target-cpu=native",
# ]
#
# [target.aarch64-unknown-linux-gnu]
# linker = "clang"
# rustflags = [
#   "-C", "link-arg=-fuse-ld=mold",
#   "-C", "target-cpu=native",
# ]
